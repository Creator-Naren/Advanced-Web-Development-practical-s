<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Records Management</title>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<style>
body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
.container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
table { width: 100%; border-collapse: collapse; margin-top: 20px; } th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
th { background-color: #007bff; color: white; }
.btn-add { background: #28a745; color: white; padding: 10px; border: none; cursor: pointer; }
.btn-delete { background: #dc3545; color: white; padding: 5px; border: none; cursor: pointer; }
.alert { padding: 8px 12px; margin-bottom: 12px; border-radius: 4px; }
.alert-error { background: #ffe6e6; color: #900; border: 1px solid #f5c2c2; }
.alert-info { background: #e8f4ff; color: #0366d6; border: 1px solid #cfe8ff; }
</style>
</head>
<body ng-app="studentApp" ng-controller="studentCtrl">

<div class="container">
  <h2>Manage Student Records</h2>

  <div ng-if="statusMessage" class="alert" ng-class="statusClass">{{statusMessage}}</div>

  <fieldset>
    <legend>Add New Student</legend>
    <input type="text" ng-model="newStudent.name" placeholder="Enter Name">
    <input type="number" ng-model="newStudent.roll" placeholder="Enter Roll No">
    <input type="text" ng-model="newStudent.dept" placeholder="Enter Department">
    <button class="btn-add" ng-click="addRecord()">Add Student</button>
  </fieldset>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Roll No</th>
        <th>Department</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr ng-repeat="student in students track by $index">
        <td>{{ student.name }}</td>
        <td>{{ student.roll }}</td>
        <td>{{ student.dept }}</td>
        <td><button class="btn-delete" ng-click="deleteRecord($index)">Remove</button></td>
      </tr>
    </tbody>
  </table>

  <p ng-if="students.length == 0">No records found. Add a student to begin.</p>
</div>

<script>
var app = angular.module('studentApp', []);
app.controller('studentCtrl', function($scope) {
  $scope.students = [];
  $scope.newStudent = {};
  $scope.statusMessage = '';
  $scope.statusClass = '';

  // Fallback sample data if API is unreachable
  const fallback = [
    { name: "Narendra Borhade", roll: 9, dept: "MCA" },
    { name: "Vaibhav Bhor", roll: 7, dept: "MCA" },
    { name: "Vaibhav singh", roll: 33, dept: "BCA" }
  ];

  function setStatus(message, type) {
    $scope.statusMessage = message;
    $scope.statusClass = type === 'error' ? 'alert-error' : 'alert-info';
    // auto-clear after 4s
    setTimeout(() => { $scope.$apply(() => { $scope.statusMessage = ''; }); }, 4000);
  }

  // Load students (API-first, fallback to sample data)
  $scope.loadStudents = function() {
    fetch('/api/students').then(r => {
      if (!r.ok) throw new Error('API responded ' + r.status);
      return r.json();
    }).then(data => {
      $scope.$apply(() => $scope.students = data);
      setStatus('Loaded students from server', 'info');
    }).catch(err => {
      console.warn('Could not load /api/students — using fallback data.', err);
      $scope.$apply(() => $scope.students = fallback.slice());
      setStatus('Using local fallback data (server not available)', 'error');
    });
  };

  $scope.addRecord = function() {
    if (!$scope.newStudent.name || !$scope.newStudent.roll) {
      alert('Please fill in Name and Roll Number.');
      return;
    }
    const payload = { name: $scope.newStudent.name, roll: Number($scope.newStudent.roll), dept: $scope.newStudent.dept || '' };

    fetch('/api/students', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(r => {
      if (!r.ok) throw new Error('API error ' + r.status);
      return r.json();
    }).then(created => {
      $scope.$apply(() => {
        // server might return created doc or doc with _id
        $scope.students.push(created);
        $scope.newStudent = {};
      });
      setStatus('Student added (server)', 'info');
    }).catch(err => {
      console.warn('POST failed — falling back to client-only add.', err);
      $scope.$apply(() => {
        $scope.students.push(payload);
        $scope.newStudent = {};
      });
      setStatus('Student added locally (server POST failed)', 'error');
    });
  };

  $scope.deleteRecord = function(index) {
    if (confirm('Are you sure you want to delete this record?')) {
      $scope.students.splice(index, 1);
      setStatus('Record removed locally', 'info');
    }
  };

  // Initialize
  $scope.loadStudents();
});
</script>

</body>
</html>
