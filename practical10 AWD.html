<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Student Record</title>
</head>
<body>
<h2>Student Registration Form</h2>
<form action="/add-student" method="POST">
<label>Name:</label><br>
<input type="text" name="name" placeholder="Enter your full name" required><br><br>

<label>Email:</label><br>
<input type="email" name="email" placeholder="Enter your email address" required><br><br>

<label>Course:</label><br>
<input type="text" name="course" placeholder="Enter your course name" required><br><br>

<button type="submit">Submit to MongoDB</button>
</form>
</body>
</html>
